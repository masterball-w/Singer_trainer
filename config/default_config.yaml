# QS Music - 音乐风格迁移与生成系统
# 默认配置文件

# ===== 项目路径 =====
project:
  name: "qsmusic"
  version: "1.0.0"
  dataset_dir: "./music_dataset"
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
  output_dir: "./outputs"

# ===== 模型配置 =====
model:
  # 支持的模型架构: musicgen, musecoco
  architecture: "musicgen"
  # Hugging Face 模型名称
  pretrained:
    musicgen: "facebook/musicgen-small"
    musecoco: "musecoco/MuseCoco"
  # 本地缓存目录
  cache_dir: "./checkpoints/pretrained"
  # 是否自动下载最新版本
  auto_update: false
  # 模型精度: float32, float16, bfloat16
  dtype: "float16"

# ===== 数据集配置 =====
dataset:
  # 支持的音频格式
  supported_formats:
    - ".wav"
    - ".mp3"
    - ".flac"
    - ".ogg"
    - ".m4a"
  # 目标采样率
  target_sample_rate: 32000
  # 目标音频格式
  target_format: "wav"
  # 音频切片长度（秒）
  slice_duration: 30
  # 切片重叠（秒）
  slice_overlap: 2
  # 最小音频长度（秒）
  min_duration: 5
  # 最大音频长度（秒）
  max_duration: 600
  # 数据增强
  augmentation:
    enabled: true
    pitch_shift_range: [-2, 2]
    time_stretch_range: [0.9, 1.1]
    noise_injection_level: 0.005

# ===== 训练配置 =====
training:
  # 设备: auto, cpu, cuda, rocm
  device: "auto"
  # 批处理大小
  batch_size: 4
  # 学习率
  learning_rate: 0.00005
  # 优化器: adamw, adam, sgd
  optimizer: "adamw"
  # 优化器参数
  optimizer_params:
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 0.00000001
  # 学习率调度器: cosine, linear, constant, warmup_cosine
  lr_scheduler: "warmup_cosine"
  # 预热步数
  warmup_steps: 500
  # 最大训练轮数
  max_epochs: 100
  # 最大训练步数（-1 表示不限制）
  max_steps: -1
  # 梯度累积步数
  gradient_accumulation_steps: 4
  # 梯度裁剪
  gradient_clip_norm: 1.0
  # 混合精度训练
  mixed_precision: true
  # 保存间隔（步）
  save_every_n_steps: 1000
  # 评估间隔（步）
  eval_every_n_steps: 500
  # 生成预览间隔（步）
  preview_every_n_steps: 2000
  # 断点续训
  resume_from_checkpoint: null
  # 工作进程数
  num_workers: 4
  # 随机种子
  seed: 42

# ===== 风格融合配置 =====
style_fusion:
  # 特征提取方法: chroma, mfcc, spectral, combined
  feature_method: "combined"
  # 风格嵌入维度
  embedding_dim: 512
  # 风格注意力头数
  num_attention_heads: 8
  # 风格融合策略: weighted_avg, attention, adaptive
  fusion_strategy: "adaptive"
  # 风格权重
  style_weights: {}

# ===== 生成配置 =====
generation:
  # 生成音频长度（秒）
  duration: 30
  # 温度参数（控制随机性）
  temperature: 1.0
  # Top-k 采样
  top_k: 250
  # Top-p (nucleus) 采样
  top_p: 0.0
  # Classifier-free guidance scale
  guidance_scale: 3.0
  # 输出采样率
  output_sample_rate: 32000
  # 输出格式
  output_format: "wav"

# ===== 监控配置 =====
monitoring:
  # TensorBoard 日志
  tensorboard:
    enabled: true
    log_dir: "./logs/tensorboard"
  # 训练日志文件
  log_file: "./logs/training.log"
  # 日志级别: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  # 控制台进度条
  progress_bar: true
  # 生成样本保存
  sample_save: true
  sample_dir: "./outputs/samples"
